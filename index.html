<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FCTV Link">
    <meta name="description" content="Streaming deportivo gratuito - FCTV33 y mirror">
    <link rel="manifest" id="manifest-link">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <title>FCTV Link · Intercambios: fighting↔tenis, bádminton↔ciclismo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            position: fixed;
            top: 0;
            left: 0;
        }
        .iframe-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #000;
        }

        #urlDisplay {
            position: fixed;
            bottom: 80px;
            left: 10px;
            z-index: 99999;
            background: rgba(0,0,0,0.85);
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #0f0;
            pointer-events: none;
            max-width: 80%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 0.9;
            transition: opacity 0.3s;
        }
        #urlDisplay:hover { opacity: 1; }

        .mirror-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #fbbd14;
            color: #000;
            font-size: 10px;
            font-weight: bold;
            border-radius: 50%;
            min-width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #000;
            pointer-events: none;
            padding: 0 4px;
        }

        .custom-header-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #100f15;
            z-index: 9998;
            border-bottom: 1px solid #f59e0b;
            pointer-events: auto;
            padding: 8px 12px;
            overflow: visible;
            transition: all 0.3s ease;
        }
        .custom-header-overlay.minimal {
            background: transparent;
            border-bottom: none;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .custom-header-overlay.minimal .overlay-buttons-grid {
            display: flex;
            justify-content: center;
            align-items: center;
            width: auto;
            gap: 0;
        }
        .custom-header-overlay.minimal .overlay-buttons-grid button:not(#domainToggleBtn) {
            display: none;
        }
        .custom-header-overlay.minimal .domain-toggle-btn {
            border-radius: 50% !important;
            width: 34px;
            height: 34px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: none;
            margin: 3px 0 10px 0;
            transform: none;
            background: #343a50;
            border: 1px solid #f59e0b;
            position: relative;
        }
        .custom-header-overlay.minimal .domain-toggle-btn.mode-mirror {
            background: #fbbd14;
            border-color: #fbbd14;
        }
        .custom-header-overlay.minimal .domain-toggle-btn .material-symbols-outlined {
            font-size: 1.1rem;
        }
        .custom-header-overlay.minimal .mirror-badge {
            top: -4px;
            right: -4px;
            min-width: 16px;
            height: 16px;
            font-size: 9px;
        }

        @media (min-width: 1024px) and (orientation: landscape) {
            .custom-header-overlay { padding: 3px 12px; }
            .overlay-buttons-grid {
                display: flex !important;
                flex-direction: row;
                flex-wrap: nowrap;
                overflow-x: auto;
                gap: 7px;
                justify-content: center;
                padding: 2px 12px;
                width: 100%;
            }
            .overlay-buttons-grid button.custom-sport-btn {
                flex: 0 0 auto;
                width: auto;
                min-width: 40px;
                max-width: 62px;
                height: 48px;
            }
            .custom-header-overlay.minimal .overlay-buttons-grid {
                display: flex;
                justify-content: center;
                gap: 0;
                overflow: visible;
            }
            .custom-header-overlay.minimal .domain-toggle-btn {
                width: 40px;
                height: 40px;
                margin: 2px 0;
            }
        }

        .overlay-buttons-grid {
            display: grid;
            grid-template-columns: repeat(9, minmax(42px, 1fr));
            gap: 7px;
            width: 100%;
            align-items: center;
            justify-items: center;
            transition: all 0.2s ease;
            margin: 0 auto;
            padding: 7px 10px;
        }
        .overlay-buttons-grid button.custom-sport-btn {
            background: #343a50;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            width: 100%;
            max-width: 64px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.18s ease;
            position: relative;
        }
        .overlay-buttons-grid button.custom-sport-btn:active {
            transform: scale(0.92);
            background: #f59e0b;
            border-color: #f59e0b;
        }
        .overlay-buttons-grid button.custom-sport-btn.active-filter {
            background: #fbbd14;
            border-color: #fbbd14;
        }
        .overlay-buttons-grid button.domain-toggle-btn {
            background: #343a50;
            border: 1px solid #f59e0b;
        }
        .overlay-buttons-grid button.domain-toggle-btn.mode-mirror {
            background: #fbbd14;
            border-color: #fbbd14;
        }
        .overlay-buttons-grid button.domain-toggle-btn.mode-original {
            background: #343a50;
            border-color: #f59e0b;
        }
        .overlay-buttons-grid button.custom-sport-btn .material-symbols-outlined {
            font-size: 1.5rem;
            color: #787f91;
            font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24;
        }
        .overlay-buttons-grid button.custom-sport-btn.active-filter .material-symbols-outlined {
            color: #000;
            font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24;
        }

        @media (max-width: 640px) {
            .custom-header-overlay { padding: 5px 7px; }
            .overlay-buttons-grid { gap: 5px; padding: 5px 7px; grid-template-columns: repeat(9, minmax(34px, 1fr)); }
            .overlay-buttons-grid button.custom-sport-btn { height: 40px; max-width: 56px; }
            .overlay-buttons-grid button.custom-sport-btn .material-symbols-outlined { font-size: 1.3rem; }
            .mirror-badge { min-width: 16px; height: 16px; font-size: 9px; top: -5px; right: -5px; }
        }
        @media (max-width: 480px) {
            .custom-header-overlay { padding: 4px 6px; }
            .overlay-buttons-grid { gap: 4px; padding: 4px 6px; grid-template-columns: repeat(9, minmax(30px, 1fr)); }
            .overlay-buttons-grid button.custom-sport-btn { height: 36px; max-width: 50px; }
            .overlay-buttons-grid button.custom-sport-btn .material-symbols-outlined { font-size: 1.15rem; }
            .mirror-badge { min-width: 14px; height: 14px; font-size: 8px; top: -4px; right: -4px; }
        }
        @media (max-width: 380px) {
            .overlay-buttons-grid { gap: 3px; grid-template-columns: repeat(9, minmax(26px, 1fr)); }
            .overlay-buttons-grid button.custom-sport-btn { height: 32px; padding: 0 2px; max-width: 46px; }
            .overlay-buttons-grid button.custom-sport-btn .material-symbols-outlined { font-size: 1rem; }
            .mirror-badge { min-width: 12px; height: 12px; font-size: 7px; }
        }

        #urlDisplay {
            bottom: 80px;
        }

        /* Ajuste para landscape: botón mirror arriba */
        @media (orientation: landscape) and (min-width: 768px) {
            #urlDisplay {
                bottom: 20px;
            }
        }
    </style>
</head>
<body>

<div class="iframe-container">
    <iframe id="streamFrame" title="Live Streaming" allow="autoplay; fullscreen; encrypted-media" referrerpolicy="strict-origin-when-cross-origin"></iframe>
</div>

<div id="urlDisplay">Cargando...</div>

<div class="custom-header-overlay" id="headerOverlay">
    <div class="overlay-buttons-grid" id="customButtonsGrid">
        <button class="custom-sport-btn" id="homeBtn" aria-label="Volver al inicio">
            <span class="material-symbols-outlined">language</span>
        </button>
        <button class="custom-sport-btn" data-sport="soccer" data-path="football.html" aria-label="Fútbol">
            <span class="material-symbols-outlined">sports_and_outdoors</span>
        </button>
        <button class="custom-sport-btn" data-sport="basketball" data-path="basketball.html" aria-label="Baloncesto">
            <span class="material-symbols-outlined">sports_basketball</span>
        </button>
        <button class="custom-sport-btn" data-sport="baseball" data-path="baseball.html" aria-label="Béisbol">
            <span class="material-symbols-outlined">sports_baseball</span>
        </button>
        <button class="custom-sport-btn" data-sport="rugby" data-path="rugby.html" aria-label="Rugby">
            <span class="material-symbols-outlined">sports_rugby</span>
        </button>
        <button class="custom-sport-btn" data-sport="american_football" data-path="american-football.html" aria-label="Fútbol americano">
            <span class="material-symbols-outlined">sports_football</span>
        </button>
        <button class="custom-sport-btn" data-sport="australian_football" data-path="aussie-rules.html" aria-label="Fútbol Australiano">
            <span class="material-symbols-outlined">sports_soccer</span>
        </button>
        <button class="custom-sport-btn" data-sport="volleyball" data-path="volleyball.html" aria-label="Voleibol">
            <span class="material-symbols-outlined">sports_volleyball</span>
        </button>
        <button class="custom-sport-btn" data-sport="motor" data-path="motorsport.html" aria-label="Motor">
            <span class="material-symbols-outlined">sports_motorsports</span>
        </button>

        <button class="custom-sport-btn domain-toggle-btn" id="domainToggleBtn" data-sport="domain_toggle" aria-label="Cambiar mirror FCTV">
            <span class="material-symbols-outlined">linear_scale</span>
            <span class="mirror-badge" id="mirrorBadge">0</span>
        </button>
        <button class="custom-sport-btn" data-sport="hockey" data-path="hockey.html" aria-label="Hockey">
            <span class="material-symbols-outlined">sports_hockey</span>
        </button>
        <button class="custom-sport-btn" data-sport="cricket" data-path="cricket.html" aria-label="Cricket">
            <span class="material-symbols-outlined">sports_cricket</span>
        </button>
        <button class="custom-sport-btn" data-sport="tennis" data-path="tennis.html" aria-label="Tenis">
            <span class="material-symbols-outlined">sports_tennis</span>
        </button>
        <button class="custom-sport-btn" data-sport="badminton" data-path="badminton.html" aria-label="Bádminton">
            <span class="material-symbols-outlined">badminton</span>
        </button>
        <button class="custom-sport-btn" data-sport="handball" data-path="handball.html" aria-label="Handball">
            <span class="material-symbols-outlined">sports_handball</span>
        </button>
        <button class="custom-sport-btn" data-sport="cycling" data-path="cycling.html" aria-label="Ciclismo">
            <span class="material-symbols-outlined">directions_bike</span>
        </button>
        <button class="custom-sport-btn" data-sport="wrestling" data-path="fighting.html" aria-label="Lucha">
            <span class="material-symbols-outlined">sports_mma</span>
        </button>
        <button class="custom-sport-btn" data-sport="others" data-path="others.html" aria-label="Otros deportes">
            <span class="material-symbols-outlined">emoji_events</span>
        </button>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // PROTECCIÓN CONTRA ROTACIÓN
    // --------------------------------------------------------------
    (function() {
        if (window.screen && window.screen.orientation) {
            const originalLock = window.screen.orientation.lock;
            window.screen.orientation.lock = function() {
                return Promise.reject(new DOMException("No permitido", "NotAllowedError"));
            };
            if (window.screen.orientation.unlock) window.screen.orientation.unlock = function() {};
        }
    })();

    // ---- CONSTANTES ----
    const FCTV_SOURCE_1 = "https://hubu.ru/fctvlink";
    const FCTV_SOURCE_2 = "https://hubu.ru/sp77link";

    // ---- Estado ----
    let fctvMirrors = [];
    let fctvIndex = 0;
    let isMinimalMode = false;

    // ---- DOM ----
    const iframe = document.getElementById('streamFrame');
    const urlDisplay = document.getElementById('urlDisplay');
    const domainToggleBtn = document.getElementById('domainToggleBtn');
    const mirrorBadge = document.getElementById('mirrorBadge');
    const headerOverlay = document.getElementById('headerOverlay');
    const homeBtn = document.getElementById('homeBtn');
    let sportButtons = document.querySelectorAll('.custom-sport-btn:not(#domainToggleBtn):not(#homeBtn)');

    // ---- Utilidades ----
    function updateUrlDisplay(url) {
        if (url) {
            urlDisplay.textContent = url;
            console.log('[URL] iframe cargando:', url);
        } else {
            urlDisplay.textContent = 'about:blank';
            console.log('[URL] iframe vacío');
        }
    }

    function cleanBaseUrl(url) {
        if (!url) return '';
        return url.replace(/[()"']/g, '').trim();
    }

    // ---- Extracción con Jina AI ----
    async function fetchUrlsFromSource(sourceUrl, sourceLabel) {
        try {
            console.log(`[${sourceLabel}] Extrayendo de ${sourceUrl}...`);
            const response = await fetch(`https://r.jina.ai/${sourceUrl}`);
            if (!response.ok) throw new Error("Jina AI error: " + response.status);
            const text = await response.text();
            
            const linkRegex = /🔗\s*Link\s*\(?(https?:\/\/[^\s)]+)/i;
            const match = text.match(linkRegex);
            let result = [];
            
            if (match) {
                const mainUrl = cleanBaseUrl(match[1]);
                result = [mainUrl];
                console.log(`[${sourceLabel}] Enlace principal encontrado por patrón:`, mainUrl);
            } else {
                const urlRegex = /(?:https?:\/\/[^\s"'<>]+)/gi;
                const matches = text.match(urlRegex) || [];
                let cleaned = matches.map(u => cleanBaseUrl(u));
                let unique = [...new Set(cleaned)];
                const filtered = unique.filter(url => !url.includes('hubu.ru'));
                if (filtered.length > 0) {
                    result = [filtered[0]];
                    console.log(`[${sourceLabel}] Enlace principal por filtro (primero no-hubu):`, result[0]);
                } else {
                    result = [];
                    console.warn(`[${sourceLabel}] No se encontró enlace principal.`);
                }
            }
            
            return result;
        } catch (e) {
            console.warn(`[${sourceLabel}] Error:`, e);
            return [];
        }
    }

    // ---- Refrescar mirrors ----
    async function refreshFctvMirrors() {
        const results = await Promise.all([
            fetchUrlsFromSource(FCTV_SOURCE_1, 'fctvlink'),
            fetchUrlsFromSource(FCTV_SOURCE_2, 'sp77link')
        ]);

        const mirrorsFromFctvlink = results[0] || [];
        const mirrorsFromSp77link = results[1] || [];

        const combined = [...mirrorsFromFctvlink, ...mirrorsFromSp77link];
        fctvMirrors = [...new Set(combined)];
        fctvIndex = 0;

        if (fctvMirrors.length > 0) {
            sessionStorage.setItem('fctv_mirrors', JSON.stringify(fctvMirrors));
            sessionStorage.setItem('fctv_index', '0');
        } else {
            sessionStorage.removeItem('fctv_mirrors');
            sessionStorage.removeItem('fctv_index');
        }

        console.log('[FCTV] Total mirrors combinados:', fctvMirrors);
        updateMirrorBadge();
        return fctvMirrors;
    }

    // ---- Navegación ----
    function loadStream(url) {
        if (url) {
            iframe.src = url;
            updateUrlDisplay(url);
        } else {
            iframe.src = 'about:blank';
            updateUrlDisplay(null);
        }
    }

    function getCurrentFctvUrl() {
        if (fctvMirrors.length === 0) return null;
        return cleanBaseUrl(fctvMirrors[fctvIndex % fctvMirrors.length]);
    }

    function setActiveButton(activeBtn) {
        homeBtn.classList.remove('active-filter');
        sportButtons.forEach(btn => btn.classList.remove('active-filter'));
        if (activeBtn) activeBtn.classList.add('active-filter');
    }

    function updateMirrorBadge() {
        const total = fctvMirrors.length;
        if (total > 0) {
            mirrorBadge.textContent = (fctvIndex % total) + 1;
            mirrorBadge.style.display = 'flex';
        } else {
            mirrorBadge.textContent = '0';
            mirrorBadge.style.display = 'none';
        }
    }

    function updateDomainToggleButton() {
        if (fctvMirrors.length === 0) {
            domainToggleBtn.classList.remove('mode-mirror', 'mode-original');
            return;
        }
        if (fctvIndex === 0) {
            domainToggleBtn.classList.remove('mode-mirror');
            domainToggleBtn.classList.add('mode-original');
        } else {
            domainToggleBtn.classList.remove('mode-original');
            domainToggleBtn.classList.add('mode-mirror');
        }
        updateMirrorBadge();
        console.log(`[FCTV] Mirror actual: ${fctvIndex+1}/${fctvMirrors.length} - ${getCurrentFctvUrl()}`);
    }

    // ---- Acciones ----
    async function toggleFctvMirror() {
        if (fctvMirrors.length === 0) {
            await refreshFctvMirrors();
        }
        if (fctvMirrors.length === 0) {
            loadStream(null);
            updateDomainToggleButton();
            return;
        }
        fctvIndex = (fctvIndex + 1) % fctvMirrors.length;
        const baseUrl = getCurrentFctvUrl();
        console.log('[FCTV] Cambiando a mirror:', baseUrl);
        loadStream(baseUrl);
        updateDomainToggleButton();
        sessionStorage.setItem('fctv_index', String(fctvIndex));
        if (navigator.vibrate) navigator.vibrate(30);
        setActiveButton(homeBtn);
    }

    function goToHome() {
        loadStream(getCurrentFctvUrl());
        setActiveButton(homeBtn);
        if (navigator.vibrate) navigator.vibrate(15);
    }

    function navigateToSportPage(path, clickedBtn) {
        const baseUrl = getCurrentFctvUrl();
        if (!baseUrl) {
            loadStream(null);
            return;
        }
        const cleanBase = baseUrl.replace(/\/+$/, '');
        const fullUrl = cleanBase + '/es/' + path;
        console.log('[Navegación] Cargando:', fullUrl);
        loadStream(fullUrl);
        setActiveButton(clickedBtn);
        if (navigator.vibrate) navigator.vibrate(15);
    }

    // ---- Modo minimal ----
    function toggleMinimalMode() {
        isMinimalMode = !isMinimalMode;
        if (isMinimalMode) {
            headerOverlay.classList.add('minimal');
            localStorage.setItem('fctv_overlay_mode', 'minimal');
        } else {
            headerOverlay.classList.remove('minimal');
            localStorage.setItem('fctv_overlay_mode', 'full');
        }
        if (navigator.vibrate) navigator.vibrate([50,30,50]);
    }

    // ---- Inicialización ----
    async function init() {
        const savedFctv = sessionStorage.getItem('fctv_mirrors');
        if (savedFctv) {
            try { fctvMirrors = JSON.parse(savedFctv); } catch(e) {}
        }
        const savedFctvIdx = sessionStorage.getItem('fctv_index');
        if (savedFctvIdx !== null && fctvMirrors.length > 0) {
            const idx = parseInt(savedFctvIdx, 10);
            if (!isNaN(idx) && idx >= 0 && idx < fctvMirrors.length) fctvIndex = idx;
        }

        const overlayMode = localStorage.getItem('fctv_overlay_mode');
        isMinimalMode = (overlayMode !== 'full');
        if (isMinimalMode) headerOverlay.classList.add('minimal');
        else headerOverlay.classList.remove('minimal');

        if (fctvMirrors.length === 0) await refreshFctvMirrors();
        loadStream(getCurrentFctvUrl());
        updateDomainToggleButton();
        setActiveButton(null);
        console.log('[Init] Mirrors FCTV:', fctvMirrors);
    }

    // ---- Variables para long press ----
    let longPressTimer = null;
    let isLongPress = false;

    // ---- Eventos ----
    domainToggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (isLongPress) {
            isLongPress = false;
            e.preventDefault();
            return;
        }
        toggleFctvMirror();
    });

    domainToggleBtn.addEventListener('dblclick', async (e) => {
        e.stopPropagation();
        await refreshFctvMirrors();
        fctvIndex = 0;
        loadStream(getCurrentFctvUrl());
        updateDomainToggleButton();
        sessionStorage.setItem('fctv_index', '0');
        if (navigator.vibrate) navigator.vibrate([50,30,50]);
    });

    function startLongPress(e) {
        isLongPress = false;
        longPressTimer = setTimeout(() => {
            isLongPress = true;
            toggleMinimalMode();
            e.preventDefault();
        }, 500);
    }

    function endLongPress(e) {
        clearTimeout(longPressTimer);
        if (isLongPress) {
            isLongPress = false;
            e.preventDefault();
        }
    }

    function cancelLongPress(e) {
        clearTimeout(longPressTimer);
        isLongPress = false;
    }

    domainToggleBtn.addEventListener('mousedown', startLongPress);
    domainToggleBtn.addEventListener('mouseup', endLongPress);
    domainToggleBtn.addEventListener('mouseleave', cancelLongPress);

    domainToggleBtn.addEventListener('touchstart', startLongPress, { passive: false });
    domainToggleBtn.addEventListener('touchend', endLongPress, { passive: false });
    domainToggleBtn.addEventListener('touchcancel', cancelLongPress, { passive: false });

    homeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        goToHome();
    });

    sportButtons.forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const path = btn.getAttribute('data-path');
            if (btn.classList.contains('active-filter') && path) {
                goToHome();
            } else if (path) {
                navigateToSportPage(path, btn);
            }
        });
    });

    // ---- Reordenación intercalada ----
    const container = document.getElementById('customButtonsGrid');
    const originalOrder = Array.from(container.children);

    function interleaveButtons() {
        const firstHalf = originalOrder.slice(0, 10);
        const secondHalf = originalOrder.slice(10, 19);
        const interleaved = [];
        for (let i = 0; i < 10; i++) {
            if (firstHalf[i]) interleaved.push(firstHalf[i]);
            if (secondHalf[i]) interleaved.push(secondHalf[i]);
        }
        while (container.firstChild) container.removeChild(container.firstChild);
        for (let btn of interleaved) container.appendChild(btn);
    }

    function restoreOriginalOrder() {
        while (container.firstChild) container.removeChild(container.firstChild);
        for (let btn of originalOrder) container.appendChild(btn);
    }

    function applyOrderByOrientation() {
        const isLargeLandscape = window.innerWidth >= 1024 && window.matchMedia("(orientation: landscape)").matches;
        isLargeLandscape ? interleaveButtons() : restoreOriginalOrder();
    }

    window.addEventListener('resize', () => setTimeout(applyOrderByOrientation, 50));
    window.addEventListener('orientationchange', () => setTimeout(applyOrderByOrientation, 50));
    applyOrderByOrientation();

    // ---- Guardar estado ----
    window.addEventListener('beforeunload', () => {
        if (fctvMirrors.length > 0) {
            sessionStorage.setItem('fctv_mirrors', JSON.stringify(fctvMirrors));
            sessionStorage.setItem('fctv_index', String(fctvIndex));
        } else {
            sessionStorage.removeItem('fctv_mirrors');
            sessionStorage.removeItem('fctv_index');
        }
    });

    init().catch(err => console.error("Error en init:", err));

    // ---- PWA (opcional) ----
    (function setupPWA() {
        function createIcon(size, text, bgColor, textColor) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, size, size);
            const grad = ctx.createLinearGradient(0, 0, size, size);
            grad.addColorStop(0, '#1f2f3a');
            grad.addColorStop(1, '#0a1219');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, size, size);
            ctx.strokeStyle = '#fbbd14';
            ctx.lineWidth = size * 0.03;
            ctx.strokeRect(size*0.1, size*0.1, size*0.8, size*0.8);
            ctx.fillStyle = textColor;
            ctx.font = `bold ${size * 0.28}px "Segoe UI", system-ui`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(text, size/2, size/2);
            ctx.font = `${size * 0.09}px monospace`;
            ctx.fillStyle = "#fbbd14";
            ctx.fillText("LIVE", size/2, size * 0.8);
            return canvas.toDataURL('image/png');
        }
        const icon192 = createIcon(192, "F33", "#0f1722", "#ffffff");
        const icon512 = createIcon(512, "FCTV", "#0f1722", "#ffffff");
        const manifestObj = {
            name: "FCTV Link - Hubu",
            short_name: "FCTV33",
            description: "Streaming deportivo gratuito.",
            start_url: ".",
            display: "standalone",
            theme_color: "#0a0a0a",
            background_color: "#000000",
            icons: [
                { src: icon192, sizes: "192x192", type: "image/png", purpose: "any maskable" },
                { src: icon512, sizes: "512x512", type: "image/png", purpose: "any maskable" }
            ]
        };
        const manifestBlob = new Blob([JSON.stringify(manifestObj)], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(manifestBlob);
        const manifestLink = document.getElementById('manifest-link');
        if (manifestLink) manifestLink.href = manifestURL;
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log("[PWA] SW no registrado", err));
            });
        }
    })();
</script>
