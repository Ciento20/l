<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FCTV Link">
    <meta name="description" content="Streaming deportivo gratuito - FCTV33 y mirror">
    <link rel="manifest" id="manifest-link">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <title>FCTV Link · Intercambios: fighting↔tenis, bádminton↔ciclismo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            position: fixed;
            top: 0;
            left: 0;
        }

        .iframe-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #000;
        }

        /* ---- Header overlay (deportes) ---- */
        .custom-header-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #141821;
            z-index: 9998;
            border-bottom: 1px solid #f59e0b;
            pointer-events: auto;
            padding: 8px 12px;
            overflow: visible;
            transition: all 0.3s ease;
        }

        .custom-header-overlay.minimal {
            background: transparent;
            border-bottom: none;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .custom-header-overlay.minimal .overlay-buttons-grid {
            display: flex;
            justify-content: center;
            align-items: center;
            width: auto;
            gap: 0;
        }

        .custom-header-overlay.minimal .overlay-buttons-grid button:not(#domainToggleBtn) {
            display: none;
        }

        .custom-header-overlay.minimal .domain-toggle-btn {
            border-radius: 50% !important;
            width: 34px;
            height: 34px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: none;
            margin: 3px auto 10px auto;
            transform: none;
            background: #343a50;
            border: 1px solid #f59e0b;
        }

        .custom-header-overlay.minimal .domain-toggle-btn.mode-mirror {
            background: #fbbd14;
            border-color: #fbbd14;
        }

        .custom-header-overlay.minimal .domain-toggle-btn .material-symbols-outlined {
            font-size: 1.1rem;
        }

        /* Modo horizontal (una línea) con espacio vertical reducido y orden intercalado */
        @media (min-width: 1024px) and (orientation: landscape) {
            .custom-header-overlay {
                padding: 3px 12px;
            }
            .overlay-buttons-grid {
                display: flex !important;
                flex-direction: row;
                flex-wrap: nowrap;
                overflow-x: auto;
                gap: 7px;
                justify-content: center;
                padding: 2px 12px;
                width: 100%;
            }
            .overlay-buttons-grid button.custom-sport-btn {
                flex: 0 0 auto;
                width: auto;
                min-width: 40px;
                max-width: 62px;
                height: 48px;
            }
            .custom-header-overlay.minimal .overlay-buttons-grid {
                display: flex;
                justify-content: center;
                gap: 0;
                overflow: visible;
            }
            .custom-header-overlay.minimal .domain-toggle-btn {
                width: 40px;
                height: 40px;
                margin: 2px auto;
            }
        }

        /* Por defecto (móvil, vertical): dos filas con orden original */
        .overlay-buttons-grid {
            display: grid;
            grid-template-columns: repeat(9, minmax(42px, 1fr));
            gap: 7px;
            width: 100%;
            align-items: center;
            justify-items: center;
            transition: all 0.2s ease;
            margin: 0 auto;
            padding: 7px 10px;
        }

        .overlay-buttons-grid button.custom-sport-btn {
            background: #343a50;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            width: 100%;
            max-width: 64px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.18s ease;
        }

        .overlay-buttons-grid button.custom-sport-btn:active {
            transform: scale(0.92);
            background: #f59e0b;
            border-color: #f59e0b;
        }

        .overlay-buttons-grid button.custom-sport-btn.active-filter {
            background: #fbbd14;
            border-color: #fbbd14;
        }

        .overlay-buttons-grid button.domain-toggle-btn {
            background: #343a50;
            border: 1px solid #f59e0b;
        }
        .overlay-buttons-grid button.domain-toggle-btn.mode-mirror {
            background: #fbbd14;
            border-color: #fbbd14;
        }
        .overlay-buttons-grid button.domain-toggle-btn.mode-original {
            background: #343a50;
            border-color: #f59e0b;
        }

        .overlay-buttons-grid button.custom-sport-btn .material-symbols-outlined {
            font-size: 1.5rem;
            color: #787f91;
            font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24;
        }

        .overlay-buttons-grid button.custom-sport-btn.active-filter .material-symbols-outlined {
            color: #000;
            font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24;
        }

        @media (max-width: 640px) {
            .custom-header-overlay {
                padding: 5px 7px;
            }
            .overlay-buttons-grid {
                gap: 5px;
                padding: 5px 7px;
                grid-template-columns: repeat(9, minmax(34px, 1fr));
            }
            .overlay-buttons-grid button.custom-sport-btn {
                height: 40px;
                max-width: 56px;
            }
            .overlay-buttons-grid button.custom-sport-btn .material-symbols-outlined {
                font-size: 1.3rem;
            }
        }

        @media (max-width: 480px) {
            .custom-header-overlay {
                padding: 4px 6px;
            }
            .overlay-buttons-grid {
                gap: 4px;
                padding: 4px 6px;
                grid-template-columns: repeat(9, minmax(30px, 1fr));
            }
            .overlay-buttons-grid button.custom-sport-btn {
                height: 36px;
                max-width: 50px;
            }
            .overlay-buttons-grid button.custom-sport-btn .material-symbols-outlined {
                font-size: 1.15rem;
            }
        }

        @media (max-width: 380px) {
            .overlay-buttons-grid {
                gap: 3px;
                grid-template-columns: repeat(9, minmax(26px, 1fr));
            }
            .overlay-buttons-grid button.custom-sport-btn {
                height: 32px;
                padding: 0 2px;
                max-width: 46px;
            }
            .overlay-buttons-grid button.custom-sport-btn .material-symbols-outlined {
                font-size: 1rem;
            }
        }

        /* ---- Botón flotante para cambiar fuente (FCTV / NTV) - CENTRO INFERIOR ---- */
        .source-toggle-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            background: #343a50;
            border: 1px solid #f59e0b;
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            font-family: system-ui, sans-serif;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .source-toggle-btn.ntv-mode {
            background: #fbbd14;
            color: #000;
            border-color: #fbbd14;
        }
        .source-toggle-btn:active {
            transform: translateX(-50%) scale(0.92);
        }

        /* ---- Botón flotante para cambiar mirror en NTV (múltiples fuentes) - ESQUINA INFERIOR DERECHA ---- */
        #ntvMirrorToggleBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10001;
            background: #343a50;
            border: 1px solid #f59e0b;
            color: #fff;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            font-family: system-ui, sans-serif;
            display: none;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        #ntvMirrorToggleBtn .material-symbols-outlined {
            font-size: 1.3rem;
            font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24;
            color: #787f91;
        }
        #ntvMirrorToggleBtn.mirror-active {
            background: #fbbd14;
            border-color: #fbbd14;
        }
        #ntvMirrorToggleBtn.mirror-active .material-symbols-outlined {
            color: #000;
        }
        #ntvMirrorToggleBtn .ntv-index-label {
            color: #fff;
            font-size: 0.9rem;
            margin-left: 2px;
        }
        #ntvMirrorToggleBtn.mirror-active .ntv-index-label {
            color: #000;
        }
        #ntvMirrorToggleBtn:active {
            transform: scale(0.92);
        }

        /* Ocultar overlay de deportes cuando estamos en modo NTV */
        .custom-header-overlay.hidden {
            display: none !important;
        }

        /* Ajustes para pantallas muy pequeñas */
        @media (max-width: 480px) {
            .source-toggle-btn {
                font-size: 12px;
                padding: 6px 14px;
                bottom: 16px;
            }
            #ntvMirrorToggleBtn {
                font-size: 12px;
                padding: 6px 10px;
                bottom: 16px;
                right: 16px;
            }
            #ntvMirrorToggleBtn .material-symbols-outlined {
                font-size: 1.1rem;
            }
            #ntvMirrorToggleBtn .ntv-index-label {
                font-size: 0.8rem;
            }
        }
        @media (max-width: 380px) {
            .source-toggle-btn {
                font-size: 11px;
                padding: 5px 12px;
                bottom: 12px;
            }
            #ntvMirrorToggleBtn {
                font-size: 11px;
                padding: 5px 8px;
                bottom: 12px;
                right: 12px;
            }
            #ntvMirrorToggleBtn .material-symbols-outlined {
                font-size: 1rem;
            }
            #ntvMirrorToggleBtn .ntv-index-label {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

<div class="iframe-container">
    <iframe id="streamFrame" title="Live Streaming" allow="autoplay; fullscreen; encrypted-media" referrerpolicy="strict-origin-when-cross-origin"></iframe>
</div>

<!-- Botón flotante para cambiar entre FCTV y NTV (centro inferior) -->
<button id="sourceToggleBtn" class="source-toggle-btn">FCTV</button>

<!-- Botón flotante para cambiar mirror en NTV (esquina inferior derecha) con icono -->
<button id="ntvMirrorToggleBtn">
    <span class="material-symbols-outlined">swap_horiz</span>
    <span class="ntv-index-label">1</span>
</button>

<!-- Overlay de deportes (solo visible en modo FCTV) -->
<div class="custom-header-overlay" id="headerOverlay">
    <div class="overlay-buttons-grid" id="customButtonsGrid">
        <!-- FILA 1 (original) -->
        <button class="custom-sport-btn" id="homeBtn" aria-label="Volver al inicio">
            <span class="material-symbols-outlined">home</span>
        </button>
        <button class="custom-sport-btn" data-sport="soccer" data-path="football.html" aria-label="Fútbol">
            <span class="material-symbols-outlined">sports_and_outdoors</span>
        </button>
        <button class="custom-sport-btn" data-sport="basketball" data-path="basketball.html" aria-label="Baloncesto">
            <span class="material-symbols-outlined">sports_basketball</span>
        </button>
        <button class="custom-sport-btn" data-sport="baseball" data-path="baseball.html" aria-label="Béisbol">
            <span class="material-symbols-outlined">sports_baseball</span>
        </button>
        <button class="custom-sport-btn" data-sport="rugby" data-path="rugby.html" aria-label="Rugby">
            <span class="material-symbols-outlined">sports_rugby</span>
        </button>
        <button class="custom-sport-btn" data-sport="american_football" data-path="american-football.html" aria-label="Fútbol americano">
            <span class="material-symbols-outlined">sports_football</span>
        </button>
        <button class="custom-sport-btn" data-sport="australian_football" data-path="aussie-rules.html" aria-label="Fútbol Australiano">
            <span class="material-symbols-outlined">sports_soccer</span>
        </button>
        <button class="custom-sport-btn" data-sport="volleyball" data-path="volleyball.html" aria-label="Voleibol">
            <span class="material-symbols-outlined">sports_volleyball</span>
        </button>
        <button class="custom-sport-btn" data-sport="motor" data-path="motorsport.html" aria-label="Motor">
            <span class="material-symbols-outlined">sports_motorsports</span>
        </button>

        <!-- FILA 2 (original) -->
        <button class="custom-sport-btn domain-toggle-btn" id="domainToggleBtn" data-sport="domain_toggle" aria-label="Cambiar dominio original/espejo">
            <span class="material-symbols-outlined">swap_horiz</span>
        </button>
        <button class="custom-sport-btn" data-sport="hockey" data-path="hockey.html" aria-label="Hockey">
            <span class="material-symbols-outlined">sports_hockey</span>
        </button>
        <button class="custom-sport-btn" data-sport="cricket" data-path="cricket.html" aria-label="Cricket">
            <span class="material-symbols-outlined">sports_cricket</span>
        </button>
        <button class="custom-sport-btn" data-sport="tennis" data-path="tennis.html" aria-label="Tenis">
            <span class="material-symbols-outlined">sports_tennis</span>
        </button>
        <button class="custom-sport-btn" data-sport="badminton" data-path="badminton.html" aria-label="Bádminton">
            <span class="material-symbols-outlined">badminton</span>
        </button>
        <button class="custom-sport-btn" data-sport="handball" data-path="handball.html" aria-label="Handball">
            <span class="material-symbols-outlined">sports_handball</span>
        </button>
        <button class="custom-sport-btn" data-sport="cycling" data-path="cycling.html" aria-label="Ciclismo">
            <span class="material-symbols-outlined">directions_bike</span>
        </button>
        <button class="custom-sport-btn" data-sport="wrestling" data-path="fighting.html" aria-label="Lucha">
            <span class="material-symbols-outlined">sports_mma</span>
        </button>
        <button class="custom-sport-btn" data-sport="others" data-path="others.html" aria-label="Otros deportes">
            <span class="material-symbols-outlined">emoji_events</span>
        </button>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // PROTECCIÓN TOTAL CONTRA ROTACIÓN FORZADA
    // --------------------------------------------------------------
    (function preventForcedOrientation() {
        if (window.screen && window.screen.orientation) {
            const originalLock = window.screen.orientation.lock;
            window.screen.orientation.lock = function(orientation) {
                console.warn("[FCTV] Bloqueo de orientación no permitido.");
                return Promise.reject(new DOMException("No permitido", "NotAllowedError"));
            };
            if (window.screen.orientation.unlock) {
                window.screen.orientation.unlock = function() {};
            }
        }
    })();

    // ---- Constantes ----
    const LINK_ORIGINAL = "https://www.fctv33hd.motorcycles/";
    const LINK_MIRROR   = "https://www.rbtvplus18.pics/";

    // Lista de URLs para NTV (puedes añadir o quitar cuantas quieras)
    const NTV_URLS = [
        "https://ntvs.cx/",      // NTV 1
        "https://ntv.cx/",       // NTV 2
        "https://ntv2.cx/"       // NTV 3 (ejemplo, cambia por las que necesites)
    ];

    // ---- Estado ----
    let currentMode = 'original';          // 'original' o 'mirror' para FCTV
    let currentSource = 'fctv';            // 'fctv' o 'ntv'
    let ntvIndex = 0;                      // índice dentro de NTV_URLS

    // ---- DOM ----
    const iframe = document.getElementById('streamFrame');
    const domainToggleBtn = document.getElementById('domainToggleBtn');
    const headerOverlay = document.getElementById('headerOverlay');
    const homeBtn = document.getElementById('homeBtn');
    const sourceToggleBtn = document.getElementById('sourceToggleBtn');
    const ntvMirrorToggleBtn = document.getElementById('ntvMirrorToggleBtn');
    const ntvIndexLabel = ntvMirrorToggleBtn.querySelector('.ntv-index-label');
    let sportButtons = document.querySelectorAll('.custom-sport-btn:not(#domainToggleBtn):not(#homeBtn)');

    // ---- Funciones base ----
    function loadStream(url) {
        iframe.src = url;
    }

    function getFctvBaseUrl() {
        return currentMode === 'original' ? LINK_ORIGINAL : LINK_MIRROR;
    }

    function getNtvBaseUrl() {
        return NTV_URLS[ntvIndex] || NTV_URLS[0];
    }

    function getCurrentBaseUrl() {
        if (currentSource === 'fctv') {
            return getFctvBaseUrl();
        } else {
            return getNtvBaseUrl();
        }
    }

    function setActiveButton(activeBtn) {
        homeBtn.classList.remove('active-filter');
        sportButtons.forEach(btn => btn.classList.remove('active-filter'));
        if (activeBtn) activeBtn.classList.add('active-filter');
    }

    function updateNtvButtonLabel() {
        ntvIndexLabel.textContent = ntvIndex + 1;
        // Aseguramos que tenga la clase mirror-active (siempre visible en modo NTV)
        ntvMirrorToggleBtn.classList.add('mirror-active');
    }

    // ---- Navegación ----
    function navigateToSportPage(path, clickedBtn) {
        if (currentSource !== 'fctv') {
            loadStream(getNtvBaseUrl());
            setActiveButton(null);
            return;
        }
        const baseUrl = getFctvBaseUrl();
        let fullUrl = baseUrl.endsWith('/') ? baseUrl + path : baseUrl + '/' + path;
        loadStream(fullUrl);
        setActiveButton(clickedBtn);
        if (navigator.vibrate) navigator.vibrate(15);
    }

    function goToHome() {
        if (currentSource === 'fctv') {
            loadStream(getFctvBaseUrl());
            setActiveButton(homeBtn);
        } else {
            loadStream(getNtvBaseUrl());
            setActiveButton(null);
        }
        if (navigator.vibrate) navigator.vibrate(15);
    }

    // ---- Cambio de dominio (FCTV) ----
    function toggleDomainMode() {
        if (currentSource !== 'fctv') return;

        if (currentMode === 'original') {
            currentMode = 'mirror';
            loadStream(LINK_MIRROR);
            domainToggleBtn.classList.add('mode-mirror');
            domainToggleBtn.classList.remove('mode-original');
        } else {
            currentMode = 'original';
            loadStream(LINK_ORIGINAL);
            domainToggleBtn.classList.remove('mode-mirror');
            domainToggleBtn.classList.add('mode-original');
        }
        setActiveButton(homeBtn);
        if (navigator.vibrate) navigator.vibrate(30);
        sessionStorage.setItem('fctv_mode', currentMode);
    }

    // ---- Cambio de mirror en NTV (múltiples fuentes) ----
    function cycleNtvMirror() {
        if (currentSource !== 'ntv') return;

        ntvIndex = (ntvIndex + 1) % NTV_URLS.length;
        const newUrl = NTV_URLS[ntvIndex];
        loadStream(newUrl);
        updateNtvButtonLabel();
        if (navigator.vibrate) navigator.vibrate(30);
        localStorage.setItem('ntv_index', ntvIndex);
        setActiveButton(null);
    }

    // ---- Cambio de fuente (FCTV <-> NTV) ----
    function setSource(source) {
        if (source === currentSource) return;
        currentSource = source;
        localStorage.setItem('fctv_source', source);

        if (source === 'ntv') {
            sourceToggleBtn.textContent = 'NTV';
            sourceToggleBtn.classList.add('ntv-mode');
            headerOverlay.classList.add('hidden');
            ntvMirrorToggleBtn.style.display = 'flex';
            updateNtvButtonLabel();
        } else {
            sourceToggleBtn.textContent = 'FCTV';
            sourceToggleBtn.classList.remove('ntv-mode');
            headerOverlay.classList.remove('hidden');
            ntvMirrorToggleBtn.style.display = 'none';
            if (isMinimalMode) {
                headerOverlay.classList.add('minimal');
            } else {
                headerOverlay.classList.remove('minimal');
            }
        }

        loadStream(getCurrentBaseUrl());
        setActiveButton(null);
        if (navigator.vibrate) navigator.vibrate(20);
    }

    function toggleSource() {
        const next = (currentSource === 'fctv') ? 'ntv' : 'fctv';
        setSource(next);
    }

    // ---- Modo minimal (solo para FCTV) ----
    let isMinimalMode = false;

    function loadOverlayPreference() {
        const saved = localStorage.getItem('fctv_overlay_mode');
        if (saved === 'minimal') {
            isMinimalMode = true;
            if (currentSource === 'fctv') headerOverlay.classList.add('minimal');
        } else if (saved === 'full') {
            isMinimalMode = false;
            if (currentSource === 'fctv') headerOverlay.classList.remove('minimal');
        } else {
            isMinimalMode = true;
            if (currentSource === 'fctv') headerOverlay.classList.add('minimal');
            localStorage.setItem('fctv_overlay_mode', 'minimal');
        }
    }

    function enableMinimalMode() {
        if (currentSource !== 'fctv') return;
        if (!isMinimalMode) {
            headerOverlay.classList.add('minimal');
            isMinimalMode = true;
            localStorage.setItem('fctv_overlay_mode', 'minimal');
            if (navigator.vibrate) navigator.vibrate([50,30,50]);
        }
    }

    function disableMinimalMode() {
        if (currentSource !== 'fctv') return;
        if (isMinimalMode) {
            headerOverlay.classList.remove('minimal');
            isMinimalMode = false;
            localStorage.setItem('fctv_overlay_mode', 'full');
            if (navigator.vibrate) navigator.vibrate([50,30,50]);
        }
    }

    function toggleMinimalMode() {
        if (currentSource !== 'fctv') return;
        isMinimalMode ? disableMinimalMode() : enableMinimalMode();
    }

    // ---- Inicialización ----
    function init() {
        const savedSource = localStorage.getItem('fctv_source');
        if (savedSource === 'ntv') {
            currentSource = 'ntv';
            sourceToggleBtn.textContent = 'NTV';
            sourceToggleBtn.classList.add('ntv-mode');
            headerOverlay.classList.add('hidden');
            ntvMirrorToggleBtn.style.display = 'flex';
        } else {
            currentSource = 'fctv';
            sourceToggleBtn.textContent = 'FCTV';
            sourceToggleBtn.classList.remove('ntv-mode');
            headerOverlay.classList.remove('hidden');
            ntvMirrorToggleBtn.style.display = 'none';
        }

        const savedMode = sessionStorage.getItem('fctv_mode');
        if (savedMode === 'mirror') {
            currentMode = 'mirror';
            domainToggleBtn.classList.add('mode-mirror');
            domainToggleBtn.classList.remove('mode-original');
        } else {
            currentMode = 'original';
            domainToggleBtn.classList.remove('mode-mirror');
            domainToggleBtn.classList.add('mode-original');
        }

        const savedNtvIndex = localStorage.getItem('ntv_index');
        if (savedNtvIndex !== null) {
            const idx = parseInt(savedNtvIndex, 10);
            if (!isNaN(idx) && idx >= 0 && idx < NTV_URLS.length) {
                ntvIndex = idx;
            }
        }
        updateNtvButtonLabel();

        loadStream(getCurrentBaseUrl());
        loadOverlayPreference();

        if (currentSource === 'fctv') setActiveButton(homeBtn);
        else setActiveButton(null);
    }

    // ---- Eventos ----
    sourceToggleBtn.addEventListener('click', toggleSource);
    ntvMirrorToggleBtn.addEventListener('click', cycleNtvMirror);

    let pressTimer = null;
    domainToggleBtn.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        pressTimer = setTimeout(() => toggleMinimalMode(), 500);
    });
    domainToggleBtn.addEventListener('mouseup', (e) => {
        if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; toggleDomainMode(); }
    });
    domainToggleBtn.addEventListener('mouseleave', () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } });
    domainToggleBtn.addEventListener('touchstart', (e) => { e.preventDefault(); pressTimer = setTimeout(() => toggleMinimalMode(), 500); });
    domainToggleBtn.addEventListener('touchend', (e) => { e.preventDefault(); if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; toggleDomainMode(); } });
    domainToggleBtn.addEventListener('touchcancel', () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } });

    homeBtn.addEventListener('click', (e) => { e.stopPropagation(); goToHome(); });

    sportButtons.forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (currentSource !== 'fctv') {
                loadStream(getNtvBaseUrl());
                setActiveButton(null);
                return;
            }
            const path = btn.getAttribute('data-path');
            if (btn.classList.contains('active-filter') && path) {
                goToHome();
            } else if (path) {
                navigateToSportPage(path, btn);
            }
        });
    });

    // ---- Reordenación intercalada ----
    const container = document.getElementById('customButtonsGrid');
    const originalOrder = Array.from(container.children);

    function interleaveButtons() {
        const firstHalf = originalOrder.slice(0, 9);
        const secondHalf = originalOrder.slice(9, 18);
        const interleaved = [];
        for (let i = 0; i < 9; i++) {
            interleaved.push(firstHalf[i], secondHalf[i]);
        }
        while (container.firstChild) container.removeChild(container.firstChild);
        for (let btn of interleaved) {
            container.appendChild(btn);
        }
    }

    function restoreOriginalOrder() {
        while (container.firstChild) container.removeChild(container.firstChild);
        for (let btn of originalOrder) {
            container.appendChild(btn);
        }
    }

    function applyOrderByOrientation() {
        const isLargeLandscape = window.innerWidth >= 1024 && window.matchMedia("(orientation: landscape)").matches;
        if (isLargeLandscape) {
            interleaveButtons();
        } else {
            restoreOriginalOrder();
        }
    }

    window.addEventListener('resize', () => {
        setTimeout(applyOrderByOrientation, 50);
    });
    window.addEventListener('orientationchange', () => {
        setTimeout(applyOrderByOrientation, 50);
    });
    applyOrderByOrientation();

    init();

    window.addEventListener('beforeunload', () => {
        sessionStorage.setItem('fctv_mode', currentMode);
        localStorage.setItem('fctv_source', currentSource);
        localStorage.setItem('ntv_index', ntvIndex);
    });

    // ---- PWA ----
    (function setupPWA() {
        function createIcon(size, text, bgColor, textColor) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, size, size);
            const grad = ctx.createLinearGradient(0, 0, size, size);
            grad.addColorStop(0, '#1f2f3a');
            grad.addColorStop(1, '#0a1219');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, size, size);
            ctx.strokeStyle = '#fbbd14';
            ctx.lineWidth = size * 0.03;
            ctx.strokeRect(size*0.1, size*0.1, size*0.8, size*0.8);
            ctx.fillStyle = textColor;
            ctx.font = `bold ${size * 0.28}px "Segoe UI", system-ui`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(text, size/2, size/2);
            ctx.font = `${size * 0.09}px monospace`;
            ctx.fillStyle = "#fbbd14";
            ctx.fillText("LIVE", size/2, size * 0.8);
            return canvas.toDataURL('image/png');
        }
        
        const icon192 = createIcon(192, "F33", "#0f1722", "#ffffff");
        const icon512 = createIcon(512, "FCTV", "#0f1722", "#ffffff");
        
        const manifestObj = {
            name: "FCTV Link - Hubu",
            short_name: "FCTV33",
            description: "Streaming deportivo gratuito.",
            start_url: ".",
            display: "standalone",
            theme_color: "#0a0a0a",
            background_color: "#000000",
            icons: [
                { src: icon192, sizes: "192x192", type: "image/png", purpose: "any maskable" },
                { src: icon512, sizes: "512x512", type: "image/png", purpose: "any maskable" }
            ]
        };
        
        const manifestBlob = new Blob([JSON.stringify(manifestObj)], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(manifestBlob);
        const manifestLink = document.getElementById('manifest-link');
        if (manifestLink) manifestLink.href = manifestURL;
        
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log("[PWA] SW no registrado", err));
            });
        }
    })();
</script>
