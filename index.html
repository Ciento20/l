<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AceStream Pro Player + Live Stats</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --primary: #00e676; --bg: #121212; --panel: #1e1e1e; --text: #e0e0e0; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .player-container { width: 95%; max-width: 900px; background: var(--panel); padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        h2 { text-align: center; color: var(--primary); margin-top: 0; letter-spacing: 1px; font-size: 1.2rem; text-transform: uppercase; }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #444; background: #2c2c2c; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 5px rgba(0,230,118,0.3); }
        button { background: var(--primary); color: #000; border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #00c853; transform: translateY(-1px); }

        .stats-bar { display: flex; justify-content: space-around; background: #111; padding: 12px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #333; font-family: 'Courier New', Courier, monospace; font-size: 0.9rem; }
        .stat-item { color: var(--primary); font-weight: bold; }
        .stat-label { color: #888; margin-right: 5px; }

        .video-wrapper { position: relative; background: #000; aspect-ratio: 16/9; border-radius: 8px; overflow: hidden; border: 1px solid #444; box-shadow: inset 0 0 20px #000; }
        video { width: 100%; height: 100%; display: block; }
        
        #status { margin-top: 15px; font-size: 13px; text-align: center; padding: 10px; border-radius: 4px; display: none; font-weight: 500; }
        .error { background: rgba(183, 28, 28, 0.2); color: #ff5252; border: 1px solid #b71c1c; }
        .success { background: rgba(27, 94, 32, 0.2); color: var(--primary); border: 1px solid #1b5e20; }
    </style>
</head>
<body>

<div class="player-container">
    <h2>AceStream Pro Player</h2>
    
    <div class="input-group">
        <input type="text" id="hash" placeholder="Pega el Content ID o enlace acestream://">
        <button onclick="checkAndPlay()">REPRODUCIR</button>
    </div>

    <div class="stats-bar" id="statsBar">
        <div><span class="stat-label">PEERS:</span><span id="peers" class="stat-item">0</span></div>
        <div><span class="stat-label">DOWNLOAD:</span><span id="speedDown" class="stat-item">0 KB/s</span></div>
        <div><span class="stat-label">UPLOAD:</span><span id="speedUp" class="stat-item">0 KB/s</span></div>
    </div>

    <div class="video-wrapper">
        <video id="video" controls crossorigin="anonymous"></video>
    </div>

    <div id="status"></div>
</div>

<script>
    const video = document.getElementById('video');
    const statusDiv = document.getElementById('status');
    let hls = new Hls();
    let statsInterval = null;

    function showStatus(msg, type) {
        statusDiv.textContent = msg;
        statusDiv.className = type;
        statusDiv.style.display = 'block';
    }

    // Formateador de velocidad (convierto bytes/KB a formato legible)
    function formatSpeed(speedInKB) {
        if (speedInKB >= 1024) {
            return (speedInKB / 1024).toFixed(2) + " MB/s";
        }
        return Math.round(speedInKB) + " KB/s";
    }

    // Función principal de estadísticas
    async function updateStats(hash) {
        try {
            // El endpoint 'get_stat' es el más fiable para datos de red en tiempo real
            const response = await fetch(`http://127.0.0.1:6878/ace/get_stat?id=${hash}`);
            const data = await response.json();
            
            // AceStream suele devolver los datos en el objeto 'response'
            const stats = data.response || data;
            
            if (stats) {
                document.getElementById('peers').textContent = stats.peers || 0;
                document.getElementById('speedDown').textContent = formatSpeed(stats.speed_down || 0);
                document.getElementById('speedUp').textContent = formatSpeed(stats.speed_up || 0);
            }
        } catch (e) {
            // Si el motor se desconecta, no mostramos error para no interrumpir, pero reseteamos visualmente
            console.log("Esperando datos del motor...");
        }
    }

    async function checkAndPlay() {
        let hashInput = document.getElementById('hash').value.trim();
        
        // Limpieza de Hash: Extrae el ID si pegan el enlace completo acestream://ID
        if (hashInput.includes("://")) {
            hashInput = hashInput.split("://")[1].split("/")[0];
        }

        if (!hashInput || hashInput.length < 10) {
            return showStatus("Por favor, introduce un Content ID válido", "error");
        }

        // Limpiar intervalos previos si existen
        if (statsInterval) clearInterval(statsInterval);
        
        showStatus("Conectando con AceStream Engine local...", "success");

        const sessionId = Math.random().toString(36).substring(7);
        // URL de streaming optimizada con transcodificación de audio y soporte HLS
        const streamUrl = `http://127.0.0.1:6878/ace/manifest.m3u8?id=${hashInput}&sid=${sessionId}&hlc=1&transcode_audio=1`;

        if (Hls.isSupported()) {
            hls.destroy();
            hls = new Hls({
                manifestLoadingMaxRetry: 10,
                manifestLoadingRetryDelay: 1000
            });
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play().catch(() => showStatus("Cargado. Haz clic en Play para iniciar.", "success"));
                showStatus("Reproduciendo: " + hashInput, "success");
                
                // Iniciamos el contador cada 2 segundos
                statsInterval = setInterval(() => updateStats(hashInput), 2000);
            });
            
            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    showStatus("Error de conexión. Verifica que AceStream Engine esté abierto.", "error");
                }
            });
        } 
        // Soporte nativo para Safari/iOS
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = streamUrl;
            video.addEventListener('loadedmetadata', () => {
                video.play();
                statsInterval = setInterval(() => updateStats(hashInput), 2000);
            });
        }
    }
</script>

</body>
</html>
