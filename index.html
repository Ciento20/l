<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FCTV Link">
    <meta name="description" content="Streaming deportivo gratuito - FCTV33 y mirror">
    <link rel="manifest" id="manifest-link">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <title>FCTV Link · Intercambios: fighting↔tenis, bádminton↔ciclismo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            position: fixed;
            top: 0;
            left: 0;
        }

        .iframe-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #000;
        }

        .custom-header-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #141821;
            z-index: 9998;
            border-bottom: 1px solid #f59e0b;
            pointer-events: auto;
            padding: 8px 12px;
            overflow: visible;
            transition: all 0.3s ease;
        }

        .custom-header-overlay.minimal {
            background: transparent;
            border-bottom: none;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .custom-header-overlay.minimal .overlay-buttons-grid {
            display: flex;
            justify-content: center;
            align-items: center;
            width: auto;
            gap: 0;
        }

        .custom-header-overlay.minimal .overlay-buttons-grid button:not(#domainToggleBtn) {
            display: none;
        }

        .custom-header-overlay.minimal .domain-toggle-btn {
            border-radius: 50% !important;
            width: 38px;
            height: 38px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: none;
            margin: 12px auto;
            transform: none;
            background: #343a50;
            border: 1px solid #f59e0b;
        }

        .custom-header-overlay.minimal .domain-toggle-btn.mode-mirror {
            background: #fbbd14;
            border-color: #fbbd14;
        }

        .custom-header-overlay.minimal .domain-toggle-btn .material-symbols-outlined {
            font-size: 1.2rem;
        }

        /* Modo horizontal (una línea) con espacio vertical reducido y orden intercalado */
        @media (min-width: 1024px) and (orientation: landscape) {
            .custom-header-overlay {
                padding: 4px 12px;
            }
            .overlay-buttons-grid {
                display: flex !important;
                flex-direction: row;
                flex-wrap: nowrap;
                overflow-x: auto;
                gap: 8px;
                justify-content: center;
                padding: 2px 12px;
                width: 100%;
            }
            .overlay-buttons-grid button.custom-sport-btn {
                flex: 0 0 auto;
                width: auto;
                min-width: 44px;
                max-width: 70px;
                height: 52px;
            }
            .custom-header-overlay.minimal .overlay-buttons-grid {
                display: flex;
                justify-content: center;
                gap: 0;
                overflow: visible;
            }
            .custom-header-overlay.minimal .domain-toggle-btn {
                width: 44px;
                height: 44px;
                margin: 8px auto;
            }
        }

        /* Por defecto (móvil, vertical): dos filas con orden original */
        .overlay-buttons-grid {
            display: grid;
            grid-template-columns: repeat(9, minmax(44px, 1fr));
            gap: 8px;
            width: 100%;
            align-items: center;
            justify-items: center;
            transition: all 0.2s ease;
            margin: 0 auto;
            padding: 8px 12px;
        }

        .overlay-buttons-grid button.custom-sport-btn {
            background: #343a50;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            width: 100%;
            max-width: 70px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.18s ease;
        }

        .overlay-buttons-grid button.custom-sport-btn:active {
            transform: scale(0.92);
            background: #f59e0b;
            border-color: #f59e0b;
        }

        .overlay-buttons-grid button.custom-sport-btn.active-filter {
            background: #fbbd14;
            border-color: #fbbd14;
        }

        .overlay-buttons-grid button.domain-toggle-btn {
            background: #343a50;
            border: 1px solid #f59e0b;
        }
        .overlay-buttons-grid button.domain-toggle-btn.mode-mirror {
            background: #fbbd14;
            border-color: #fbbd14;
        }
        .overlay-buttons-grid button.domain-toggle-btn.mode-original {
            background: #343a50;
            border-color: #f59e0b;
        }

        .overlay-buttons-grid button.custom-sport-btn .material-symbols-outlined {
            font-size: 1.65rem;
            color: #787f91;
            font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24;
        }

        .overlay-buttons-grid button.custom-sport-btn.active-filter .material-symbols-outlined {
            color: #000;
            font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24;
        }

        @media (max-width: 640px) {
            .custom-header-overlay {
                padding: 6px 8px;
            }
            .overlay-buttons-grid {
                gap: 5px;
                padding: 6px 8px;
                grid-template-columns: repeat(9, minmax(38px, 1fr));
            }
            .overlay-buttons-grid button.custom-sport-btn {
                height: 44px;
            }
            .overlay-buttons-grid button.custom-sport-btn .material-symbols-outlined {
                font-size: 1.4rem;
            }
        }

        @media (max-width: 480px) {
            .custom-header-overlay {
                padding: 5px 6px;
            }
            .overlay-buttons-grid {
                gap: 4px;
                padding: 5px 6px;
                grid-template-columns: repeat(9, minmax(32px, 1fr));
            }
            .overlay-buttons-grid button.custom-sport-btn {
                height: 40px;
            }
            .overlay-buttons-grid button.custom-sport-btn .material-symbols-outlined {
                font-size: 1.2rem;
            }
        }

        @media (max-width: 380px) {
            .overlay-buttons-grid {
                gap: 3px;
                grid-template-columns: repeat(9, minmax(28px, 1fr));
            }
            .overlay-buttons-grid button.custom-sport-btn {
                height: 36px;
                padding: 0 2px;
            }
            .overlay-buttons-grid button.custom-sport-btn .material-symbols-outlined {
                font-size: 1.05rem;
            }
        }
    </style>
</head>
<body>

<div class="iframe-container">
    <iframe id="streamFrame" title="Live Streaming FCTV" allow="autoplay; fullscreen; encrypted-media" referrerpolicy="strict-origin-when-cross-origin"></iframe>
</div>

<div class="custom-header-overlay" id="headerOverlay">
    <div class="overlay-buttons-grid" id="customButtonsGrid">
        <!-- 18 botones: primera mitad (fila1) + segunda mitad (fila2) -->
        <!-- FILA 1 (original) -->
        <button class="custom-sport-btn" id="homeBtn" aria-label="Volver al inicio">
            <span class="material-symbols-outlined">home</span>
        </button>
        <button class="custom-sport-btn" data-sport="soccer" data-path="football.html" aria-label="Fútbol">
            <span class="material-symbols-outlined">sports_and_outdoors</span>
        </button>
        <button class="custom-sport-btn" data-sport="basketball" data-path="basketball.html" aria-label="Baloncesto">
            <span class="material-symbols-outlined">sports_basketball</span>
        </button>
        <button class="custom-sport-btn" data-sport="baseball" data-path="baseball.html" aria-label="Béisbol">
            <span class="material-symbols-outlined">sports_baseball</span>
        </button>
        <button class="custom-sport-btn" data-sport="rugby" data-path="rugby.html" aria-label="Rugby">
            <span class="material-symbols-outlined">sports_rugby</span>
        </button>
        <button class="custom-sport-btn" data-sport="american_football" data-path="american-football.html" aria-label="Fútbol americano">
            <span class="material-symbols-outlined">sports_football</span>
        </button>
        <button class="custom-sport-btn" data-sport="australian_football" data-path="aussie-rules.html" aria-label="Fútbol Australiano">
            <span class="material-symbols-outlined">sports_soccer</span>
        </button>
        <button class="custom-sport-btn" data-sport="volleyball" data-path="volleyball.html" aria-label="Voleibol">
            <span class="material-symbols-outlined">sports_volleyball</span>
        </button>
        <button class="custom-sport-btn" data-sport="motor" data-path="motorsport.html" aria-label="Motor">
            <span class="material-symbols-outlined">sports_motorsports</span>
        </button>

        <!-- FILA 2 (original) -->
        <button class="custom-sport-btn domain-toggle-btn" id="domainToggleBtn" data-sport="domain_toggle" aria-label="Cambiar dominio original/espejo">
            <span class="material-symbols-outlined">swap_horiz</span>
        </button>
        <button class="custom-sport-btn" data-sport="hockey" data-path="hockey.html" aria-label="Hockey">
            <span class="material-symbols-outlined">sports_hockey</span>
        </button>
        <button class="custom-sport-btn" data-sport="cricket" data-path="cricket.html" aria-label="Cricket">
            <span class="material-symbols-outlined">sports_cricket</span>
        </button>
        <button class="custom-sport-btn" data-sport="tennis" data-path="tennis.html" aria-label="Tenis">
            <span class="material-symbols-outlined">sports_tennis</span>
        </button>
        <button class="custom-sport-btn" data-sport="badminton" data-path="badminton.html" aria-label="Bádminton">
            <span class="material-symbols-outlined">badminton</span>
        </button>
        <button class="custom-sport-btn" data-sport="handball" data-path="handball.html" aria-label="Handball">
            <span class="material-symbols-outlined">sports_handball</span>
        </button>
        <button class="custom-sport-btn" data-sport="cycling" data-path="cycling.html" aria-label="Ciclismo">
            <span class="material-symbols-outlined">directions_bike</span>
        </button>
        <button class="custom-sport-btn" data-sport="wrestling" data-path="fighting.html" aria-label="Lucha">
            <span class="material-symbols-outlined">sports_mma</span>
        </button>
        <button class="custom-sport-btn" data-sport="others" data-path="others.html" aria-label="Otros deportes">
            <span class="material-symbols-outlined">emoji_events</span>
        </button>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // PROTECCIÓN TOTAL CONTRA ROTACIÓN FORZADA
    // --------------------------------------------------------------
    (function preventForcedOrientation() {
        if (window.screen && window.screen.orientation) {
            const originalLock = window.screen.orientation.lock;
            window.screen.orientation.lock = function(orientation) {
                console.warn("[FCTV] Bloqueo de orientación no permitido.");
                return Promise.reject(new DOMException("No permitido", "NotAllowedError"));
            };
            if (window.screen.orientation.unlock) {
                window.screen.orientation.unlock = function() {};
            }
        }
    })();

    const LINK_ORIGINAL = "https://www.fctv33hd.motorcycles/";
    const LINK_MIRROR   = "https://www.rbtvplus18.pics/";
    
    let currentMode = 'original';
    const iframe = document.getElementById('streamFrame');
    const domainToggleBtn = document.getElementById('domainToggleBtn');
    const headerOverlay = document.getElementById('headerOverlay');
    const homeBtn = document.getElementById('homeBtn');
    let sportButtons = document.querySelectorAll('.custom-sport-btn:not(#domainToggleBtn):not(#homeBtn)');
    
    function loadStream(url) {
        iframe.src = url;
    }
    
    function getCurrentBaseUrl() {
        return currentMode === 'original' ? LINK_ORIGINAL : LINK_MIRROR;
    }
    
    function setActiveButton(activeBtn) {
        homeBtn.classList.remove('active-filter');
        sportButtons.forEach(btn => btn.classList.remove('active-filter'));
        if (activeBtn) activeBtn.classList.add('active-filter');
    }
    
    function navigateToSportPage(path, clickedBtn) {
        const baseUrl = getCurrentBaseUrl();
        let fullUrl = baseUrl.endsWith('/') ? baseUrl + path : baseUrl + '/' + path;
        loadStream(fullUrl);
        setActiveButton(clickedBtn);
        if (navigator.vibrate) navigator.vibrate(15);
    }
    
    function goToHome() {
        loadStream(getCurrentBaseUrl());
        setActiveButton(homeBtn);
        if (navigator.vibrate) navigator.vibrate(15);
    }
    
    function toggleDomainMode() {
        if (currentMode === 'original') {
            currentMode = 'mirror';
            loadStream(LINK_MIRROR);
            domainToggleBtn.classList.add('mode-mirror');
            domainToggleBtn.classList.remove('mode-original');
        } else {
            currentMode = 'original';
            loadStream(LINK_ORIGINAL);
            domainToggleBtn.classList.remove('mode-mirror');
            domainToggleBtn.classList.add('mode-original');
        }
        setActiveButton(homeBtn);
        if (navigator.vibrate) navigator.vibrate(30);
        sessionStorage.setItem('fctv_mode', currentMode);
    }
    
    function init() {
        const savedMode = sessionStorage.getItem('fctv_mode');
        if (savedMode === 'mirror') {
            currentMode = 'mirror';
            loadStream(LINK_MIRROR);
            domainToggleBtn.classList.add('mode-mirror');
            domainToggleBtn.classList.remove('mode-original');
        } else {
            currentMode = 'original';
            loadStream(LINK_ORIGINAL);
            domainToggleBtn.classList.remove('mode-mirror');
            domainToggleBtn.classList.add('mode-original');
        }
        setActiveButton(homeBtn);
    }
    
    let pressTimer = null;
    let isMinimalMode = false;
    
    function loadOverlayPreference() {
        const saved = localStorage.getItem('fctv_overlay_mode');
        if (saved === 'minimal') enableMinimalMode();
        else if (saved === 'full') disableMinimalMode();
        else enableMinimalMode();
    }
    
    function enableMinimalMode() {
        if (!isMinimalMode) {
            headerOverlay.classList.add('minimal');
            isMinimalMode = true;
            localStorage.setItem('fctv_overlay_mode', 'minimal');
            if (navigator.vibrate) navigator.vibrate([50,30,50]);
        }
    }
    
    function disableMinimalMode() {
        if (isMinimalMode) {
            headerOverlay.classList.remove('minimal');
            isMinimalMode = false;
            localStorage.setItem('fctv_overlay_mode', 'full');
            if (navigator.vibrate) navigator.vibrate([50,30,50]);
        }
    }
    
    function toggleMinimalMode() {
        isMinimalMode ? disableMinimalMode() : enableMinimalMode();
    }
    
    domainToggleBtn.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        pressTimer = setTimeout(() => toggleMinimalMode(), 500);
    });
    domainToggleBtn.addEventListener('mouseup', (e) => {
        if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; toggleDomainMode(); }
    });
    domainToggleBtn.addEventListener('mouseleave', () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } });
    domainToggleBtn.addEventListener('touchstart', (e) => { e.preventDefault(); pressTimer = setTimeout(() => toggleMinimalMode(), 500); });
    domainToggleBtn.addEventListener('touchend', (e) => { e.preventDefault(); if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; toggleDomainMode(); } });
    domainToggleBtn.addEventListener('touchcancel', () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } });
    
    homeBtn.addEventListener('click', (e) => { e.stopPropagation(); goToHome(); });
    
    sportButtons.forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const path = btn.getAttribute('data-path');
            if (btn.classList.contains('active-filter') && path) goToHome();
            else if (path) navigateToSportPage(path, btn);
        });
    });
    
    init();
    loadOverlayPreference();
    window.addEventListener('beforeunload', () => sessionStorage.setItem('fctv_mode', currentMode));

    // --------------------------------------------------------------
    // REORDENACIÓN INTERCALADA CORRECTA (alterna fila1 y fila2)
    // --------------------------------------------------------------
    const container = document.getElementById('customButtonsGrid');
    // Guardamos el orden original de los 18 botones (tal cual están en el HTML)
    const originalOrder = Array.from(container.children);  // lista de nodos

    function interleaveButtons() {
        // Tomamos los primeros 9 (fila1) y los siguientes 9 (fila2)
        const firstHalf = originalOrder.slice(0, 9);
        const secondHalf = originalOrder.slice(9, 18);
        const interleaved = [];
        for (let i = 0; i < 9; i++) {
            interleaved.push(firstHalf[i], secondHalf[i]);
        }
        // Vaciamos el contenedor y añadimos en el nuevo orden
        while (container.firstChild) container.removeChild(container.firstChild);
        for (let btn of interleaved) {
            container.appendChild(btn);
        }
    }

    function restoreOriginalOrder() {
        while (container.firstChild) container.removeChild(container.firstChild);
        for (let btn of originalOrder) {
            container.appendChild(btn);
        }
    }

    function applyOrderByOrientation() {
        const isLargeLandscape = window.innerWidth >= 1024 && window.matchMedia("(orientation: landscape)").matches;
        if (isLargeLandscape) {
            interleaveButtons();
        } else {
            restoreOriginalOrder();
        }
    }

    // Ejecutar al inicio y cuando cambie tamaño/orientación
    window.addEventListener('resize', () => {
        setTimeout(applyOrderByOrientation, 50);
    });
    window.addEventListener('orientationchange', () => {
        setTimeout(applyOrderByOrientation, 50);
    });
    applyOrderByOrientation();
</script>

<script>
    (function setupPWA() {
        function createIcon(size, text, bgColor, textColor) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, size, size);
            const grad = ctx.createLinearGradient(0, 0, size, size);
            grad.addColorStop(0, '#1f2f3a');
            grad.addColorStop(1, '#0a1219');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, size, size);
            ctx.strokeStyle = '#fbbd14';
            ctx.lineWidth = size * 0.03;
            ctx.strokeRect(size*0.1, size*0.1, size*0.8, size*0.8);
            ctx.fillStyle = textColor;
            ctx.font = `bold ${size * 0.28}px "Segoe UI", system-ui`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(text, size/2, size/2);
            ctx.font = `${size * 0.09}px monospace`;
            ctx.fillStyle = "#fbbd14";
            ctx.fillText("LIVE", size/2, size * 0.8);
            return canvas.toDataURL('image/png');
        }
        
        const icon192 = createIcon(192, "F33", "#0f1722", "#ffffff");
        const icon512 = createIcon(512, "FCTV", "#0f1722", "#ffffff");
        
        const manifestObj = {
            name: "FCTV Link - Hubu",
            short_name: "FCTV33",
            description: "Streaming deportivo gratuito.",
            start_url: ".",
            display: "standalone",
            theme_color: "#0a0a0a",
            background_color: "#000000",
            icons: [
                { src: icon192, sizes: "192x192", type: "image/png", purpose: "any maskable" },
                { src: icon512, sizes: "512x512", type: "image/png", purpose: "any maskable" }
            ]
        };
        
        const manifestBlob = new Blob([JSON.stringify(manifestObj)], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(manifestBlob);
        const manifestLink = document.getElementById('manifest-link');
        if (manifestLink) manifestLink.href = manifestURL;
        
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log("[PWA] SW no registrado", err));
            });
        }
    })();
</script>
</body>
</html>
