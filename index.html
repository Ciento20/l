<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FCTV Link">
    <meta name="description" content="Streaming deportivo gratuito - FCTV33 y mirror">
    <link rel="manifest" id="manifest-link">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1" rel="stylesheet">
    <title>FCTV Link · 9 botones por fila</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            position: fixed;
            top: 0;
            left: 0;
        }

        .iframe-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #000;
        }

        /* HEADER: exactamente 2 filas de 9 botones cada una */
        .custom-header-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #141821;
            z-index: 9998;
            border-bottom: 1px solid #f59e0b;
            pointer-events: auto;
            padding: 8px 12px;
            overflow: visible;
            transition: all 0.3s ease;
        }

        /* Modo minimalista: solo botón dominio flotante */
        .custom-header-overlay.minimal {
            background: transparent;
            border-bottom: none;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .custom-header-overlay.minimal .overlay-buttons-grid {
            display: flex;
            justify-content: center;
            align-items: center;
            width: auto;
            gap: 0;
        }

        .custom-header-overlay.minimal .overlay-buttons-grid button:not(#domainToggleBtn) {
            display: none;
        }

        /* ========== BOTÓN CIRCULAR FLOTANTE PLANO (MODO MINIMAL) ========== */
        .custom-header-overlay.minimal .domain-toggle-btn {
            border-radius: 50% !important;
            width: 38px;
            height: 38px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: none;
            margin: 12px auto;
            transform: none;
            background: #343a50;
            border: 1px solid #f59e0b;
        }

        .custom-header-overlay.minimal .domain-toggle-btn.mode-mirror {
            background: #fbbd14;
            border-color: #fbbd14;
        }

        .custom-header-overlay.minimal .domain-toggle-btn .material-symbols-outlined {
            font-size: 1.2rem;
        }

        /* Ajuste para pantallas pequeñas (móviles) */
        @media (max-width: 640px) {
            .custom-header-overlay.minimal .domain-toggle-btn {
                width: 34px;
                height: 34px;
                margin: 10px auto;
            }
            .custom-header-overlay.minimal .domain-toggle-btn .material-symbols-outlined {
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .custom-header-overlay.minimal .domain-toggle-btn {
                width: 32px;
                height: 32px;
            }
            .custom-header-overlay.minimal .domain-toggle-btn .material-symbols-outlined {
                font-size: 0.9rem;
            }
        }

        @media (max-width: 380px) {
            .custom-header-overlay.minimal .domain-toggle-btn {
                width: 30px;
                height: 30px;
            }
            .custom-header-overlay.minimal .domain-toggle-btn .material-symbols-outlined {
                font-size: 0.85rem;
            }
        }

        /* ========== GRID EXACTAMENTE 9 COLUMNAS POR FILA ========== */
        .overlay-buttons-grid {
            display: grid;
            grid-template-columns: repeat(9, minmax(44px, 1fr));
            gap: 8px;
            width: 100%;
            align-items: center;
            justify-items: center;
            transition: all 0.2s ease;
            margin: 0 auto;
        }

        .overlay-buttons-grid button.custom-sport-btn {
            background: #343a50;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            width: 100%;
            max-width: 70px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.18s ease;
        }

        .overlay-buttons-grid button.custom-sport-btn:active {
            transform: scale(0.92);
            background: #f59e0b;
            border-color: #f59e0b;
        }

        .overlay-buttons-grid button.custom-sport-btn.active-filter {
            background: #fbbd14;
            border-color: #fbbd14;
        }

        .overlay-buttons-grid button.domain-toggle-btn {
            background: #343a50;
            border: 1px solid #f59e0b;
        }
        .overlay-buttons-grid button.domain-toggle-btn.mode-mirror {
            background: #fbbd14;
            border-color: #fbbd14;
        }
        .overlay-buttons-grid button.domain-toggle-btn.mode-original {
            background: #343a50;
            border-color: #f59e0b;
        }

        .overlay-buttons-grid button.custom-sport-btn .material-symbols-outlined {
            font-size: 1.45rem;
            color: #f0f0f0;
            font-variation-settings: 'FILL' 0, 'wght' 450, 'GRAD' 0, 'opsz' 24;
        }

        .overlay-buttons-grid button.custom-sport-btn.active-filter .material-symbols-outlined {
            color: #000;
            font-variation-settings: 'FILL' 1, 'wght' 500;
        }

        /* ========== RESPONSIVE: 9 COLUMNAS EN TODOS LOS TAMAÑOS ========== */
        @media (max-width: 640px) {
            .custom-header-overlay {
                padding: 6px 8px;
            }
            .overlay-buttons-grid {
                grid-template-columns: repeat(9, minmax(38px, 1fr));
                gap: 5px;
            }
            .overlay-buttons-grid button.custom-sport-btn {
                height: 44px;
            }
            .overlay-buttons-grid button.custom-sport-btn .material-symbols-outlined {
                font-size: 1.25rem;
            }
        }

        @media (max-width: 480px) {
            .custom-header-overlay {
                padding: 5px 6px;
            }
            .overlay-buttons-grid {
                grid-template-columns: repeat(9, minmax(32px, 1fr));
                gap: 4px;
            }
            .overlay-buttons-grid button.custom-sport-btn {
                height: 40px;
            }
            .overlay-buttons-grid button.custom-sport-btn .material-symbols-outlined {
                font-size: 1.05rem;
            }
        }

        /* Pantallas muy estrechas (ej. 360px) */
        @media (max-width: 380px) {
            .overlay-buttons-grid {
                grid-template-columns: repeat(9, minmax(28px, 1fr));
                gap: 3px;
            }
            .overlay-buttons-grid button.custom-sport-btn {
                height: 36px;
                padding: 0 2px;
            }
            .overlay-buttons-grid button.custom-sport-btn .material-symbols-outlined {
                font-size: 0.9rem;
            }
        }

        /* Modo horizontal (tablet, PC): se mantiene grid de 9 columnas */
        @media (min-width: 1024px) and (orientation: landscape) {
            .custom-header-overlay {
                padding: 6px 20px;
            }
            .overlay-buttons-grid {
                display: grid;
                grid-template-columns: repeat(9, minmax(70px, auto));
                gap: 12px;
                justify-content: center;
            }
            .overlay-buttons-grid button.custom-sport-btn {
                height: 58px;
                width: auto;
                min-width: 60px;
            }
            .overlay-buttons-grid button.custom-sport-btn .material-symbols-outlined {
                font-size: 1.5rem;
            }
            
            .custom-header-overlay.minimal {
                background: transparent;
                padding: 0;
            }
            .custom-header-overlay.minimal .overlay-buttons-grid {
                display: flex;
                gap: 0;
            }
            .custom-header-overlay.minimal .domain-toggle-btn {
                width: 42px;
                height: 42px;
                margin: 14px auto;
            }
            .custom-header-overlay.minimal .domain-toggle-btn .material-symbols-outlined {
                font-size: 1.3rem;
            }
        }

        /* Pantallas grandes 4K */
        @media (min-width: 1920px) {
            .overlay-buttons-grid {
                gap: 16px;
            }
            .overlay-buttons-grid button.custom-sport-btn {
                height: 70px;
                min-width: 80px;
            }
            .overlay-buttons-grid button.custom-sport-btn .material-symbols-outlined {
                font-size: 1.8rem;
            }
            .custom-header-overlay.minimal .domain-toggle-btn {
                width: 46px;
                height: 46px;
            }
        }
    </style>
</head>
<body>

<div class="iframe-container">
    <iframe id="streamFrame" title="Live Streaming FCTV" allow="autoplay; fullscreen; encrypted-media" referrerpolicy="strict-origin-when-cross-origin"></iframe>
</div>

<div class="custom-header-overlay" id="headerOverlay">
    <div class="overlay-buttons-grid" id="customButtonsGrid">
        <!-- ========== PRIMERA FILA: 9 BOTONES ========== -->
        <!-- Botón de dominio (columna 1) -->
        <button class="custom-sport-btn domain-toggle-btn" id="domainToggleBtn" data-sport="domain_toggle" aria-label="Cambiar dominio original/espejo">
            <span class="material-symbols-outlined">swap_horiz</span>
        </button>

        <!-- Fútbol (columna 2) -->
        <button class="custom-sport-btn" data-sport="soccer" data-path="football.html" aria-label="Fútbol">
            <span class="material-symbols-outlined">sports_and_outdoors</span>
        </button>

        <!-- BALONCESTO (antes TENIS) -->
        <button class="custom-sport-btn" data-sport="basketball" data-path="basketball.html" aria-label="Baloncesto">
            <span class="material-symbols-outlined">sports_basketball</span>
        </button>

        <!-- HOCKEY (antes MOTOR) -->
        <button class="custom-sport-btn" data-sport="hockey" data-path="hockey.html" aria-label="Hockey">
            <span class="material-symbols-outlined">sports_hockey</span>
        </button>

        <!-- Rugby (columna 5) -->
        <button class="custom-sport-btn" data-sport="rugby" data-path="rugby.html" aria-label="Rugby">
            <span class="material-symbols-outlined">sports_rugby</span>
        </button>

        <!-- Fútbol americano (columna 6) -->
        <button class="custom-sport-btn" data-sport="american_football" data-path="american-football.html" aria-label="Fútbol americano">
            <span class="material-symbols-outlined">sports_football</span>
        </button>

        <!-- Fútbol Australiano (columna 7) -->
        <button class="custom-sport-btn" data-sport="australian_football" data-path="aussie-rules.html" aria-label="Fútbol Australiano">
            <span class="material-symbols-outlined">sports_soccer</span>
        </button>

        <!-- Cricket (columna 8) -->
        <button class="custom-sport-btn" data-sport="cricket" data-path="cricket.html" aria-label="Cricket">
            <span class="material-symbols-outlined">sports_cricket</span>
        </button>

        <!-- MOTOR (antes HOCKEY) -->
        <button class="custom-sport-btn" data-sport="motor" data-path="motorsport.html" aria-label="Motor">
            <span class="material-symbols-outlined">sports_motorsports</span>
        </button>

        <!-- ========== SEGUNDA FILA: 9 BOTONES ========== -->
        <!-- INICIO (antes BÁDMINTON): botón home ahora en columna 1 de segunda fila -->
        <button class="custom-sport-btn" id="homeBtn" aria-label="Volver al inicio">
            <span class="material-symbols-outlined">home</span>
        </button>

        <!-- Béisbol (columna 2) -->
        <button class="custom-sport-btn" data-sport="baseball" data-path="baseball.html" aria-label="Béisbol">
            <span class="material-symbols-outlined">sports_baseball</span>
        </button>

        <!-- Voleibol (columna 3) -->
        <button class="custom-sport-btn" data-sport="volleyball" data-path="volleyball.html" aria-label="Voleibol">
            <span class="material-symbols-outlined">sports_volleyball</span>
        </button>

        <!-- Lucha (columna 4) -->
        <button class="custom-sport-btn" data-sport="wrestling" data-path="fighting.html" aria-label="Lucha">
            <span class="material-symbols-outlined">sports_mma</span>
        </button>

        <!-- Ciclismo (columna 5) -->
        <button class="custom-sport-btn" data-sport="cycling" data-path="cycling.html" aria-label="Ciclismo">
            <span class="material-symbols-outlined">directions_bike</span>
        </button>

        <!-- Handball (columna 6) -->
        <button class="custom-sport-btn" data-sport="handball" data-path="handball.html" aria-label="Handball">
            <span class="material-symbols-outlined">sports_handball</span>
        </button>

        <!-- Otros deportes (columna 7) -->
        <button class="custom-sport-btn" data-sport="others" data-path="others.html" aria-label="Otros deportes">
            <span class="material-symbols-outlined">emoji_events</span>
        </button>

        <!-- TENIS (antes BALONCESTO) -->
        <button class="custom-sport-btn" data-sport="tennis" data-path="tennis.html" aria-label="Tenis">
            <span class="material-symbols-outlined">sports_tennis</span>
        </button>

        <!-- BÁDMINTON (antes INICIO) -->
        <button class="custom-sport-btn" data-sport="badminton" data-path="badminton.html" aria-label="Bádminton">
            <span class="material-symbols-outlined">badminton</span>
        </button>
    </div>
</div>

<script>
    const LINK_ORIGINAL = "https://www.fctv33hd.motorcycles/";
    const LINK_MIRROR   = "https://www.rbtvplus18.pics/";
    
    let currentMode = 'original';
    const iframe = document.getElementById('streamFrame');
    const domainToggleBtn = document.getElementById('domainToggleBtn');
    const headerOverlay = document.getElementById('headerOverlay');
    const homeBtn = document.getElementById('homeBtn');
    
    // Todos los botones de deporte (con data-path) excepto domainToggleBtn y homeBtn
    const sportButtons = document.querySelectorAll('.custom-sport-btn:not(#domainToggleBtn):not(#homeBtn)');
    
    function loadStream(url) {
        iframe.src = url;
    }
    
    function getCurrentBaseUrl() {
        return currentMode === 'original' ? LINK_ORIGINAL : LINK_MIRROR;
    }
    
    // Función unificada para actualizar el botón activo (home o deporte)
    function setActiveButton(activeBtn) {
        // Remover clase active-filter de todos los botones (home + deportes)
        homeBtn.classList.remove('active-filter');
        sportButtons.forEach(btn => btn.classList.remove('active-filter'));
        // Si hay un botón activo, agregarle la clase
        if (activeBtn) {
            activeBtn.classList.add('active-filter');
        }
    }
    
    // Navegar a una página de deporte específica
    function navigateToSportPage(path, clickedBtn) {
        const baseUrl = getCurrentBaseUrl();
        let fullUrl = baseUrl;
        if (!fullUrl.endsWith('/')) fullUrl += '/';
        fullUrl += path;
        loadStream(fullUrl);
        // Actualizar UI: activar el botón de deporte, desactivar home
        setActiveButton(clickedBtn);
        if (navigator.vibrate) navigator.vibrate(15);
        console.log(`[Navegación] Cargando deporte: ${fullUrl}`);
    }
    
    // Volver a la página principal (home)
    function goToHome() {
        const baseUrl = getCurrentBaseUrl();
        loadStream(baseUrl);
        // Activar el botón de inicio y desactivar cualquier deporte
        setActiveButton(homeBtn);
        if (navigator.vibrate) navigator.vibrate(15);
        console.log(`[Navegación] Volver al inicio: ${baseUrl}`);
    }
    
    // Cambiar entre dominio original y espejo (siempre carga la página base)
    function toggleDomainMode() {
        if (currentMode === 'original') {
            currentMode = 'mirror';
            loadStream(LINK_MIRROR);
            domainToggleBtn.classList.add('mode-mirror');
            domainToggleBtn.classList.remove('mode-original');
        } else {
            currentMode = 'original';
            loadStream(LINK_ORIGINAL);
            domainToggleBtn.classList.remove('mode-mirror');
            domainToggleBtn.classList.add('mode-original');
        }
        // Después de cambiar dominio, aseguramos que estamos en home (UI y estado)
        setActiveButton(homeBtn);
        if (navigator.vibrate) navigator.vibrate(30);
        sessionStorage.setItem('fctv_mode', currentMode);
        console.log(`[Navegación] Dominio cambiado a: ${currentMode === 'original' ? 'ORIGINAL' : 'MIRROR'} (home)`);
    }
    
    // Inicializar la aplicación: cargar dominio guardado y UI coherente
    function init() {
        const savedMode = sessionStorage.getItem('fctv_mode');
        if (savedMode === 'mirror') {
            currentMode = 'mirror';
            loadStream(LINK_MIRROR);
            domainToggleBtn.classList.add('mode-mirror');
            domainToggleBtn.classList.remove('mode-original');
        } else {
            currentMode = 'original';
            loadStream(LINK_ORIGINAL);
            domainToggleBtn.classList.remove('mode-mirror');
            domainToggleBtn.classList.add('mode-original');
        }
        // Al iniciar estamos en la página base (home), activar visualmente el botón home
        setActiveButton(homeBtn);
    }
    
    // ========== PULSACIÓN LARGA PARA MODO MINIMALISTA ==========
    let pressTimer = null;
    let isMinimalMode = false;
    
    function loadOverlayPreference() {
        const savedOverlayMode = localStorage.getItem('fctv_overlay_mode');
        if (savedOverlayMode === 'minimal') {
            enableMinimalMode();
        } else if (savedOverlayMode === 'full') {
            disableMinimalMode();
        } else {
            enableMinimalMode(); // Por defecto minimalista
        }
    }
    
    function enableMinimalMode() {
        if (!isMinimalMode) {
            headerOverlay.classList.add('minimal');
            isMinimalMode = true;
            localStorage.setItem('fctv_overlay_mode', 'minimal');
            if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
            console.log("[UI] Modo minimalista: botón circular flotante");
        }
    }
    
    function disableMinimalMode() {
        if (isMinimalMode) {
            headerOverlay.classList.remove('minimal');
            isMinimalMode = false;
            localStorage.setItem('fctv_overlay_mode', 'full');
            if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
            console.log("[UI] Modo completo restaurado (9 botones por fila)");
        }
    }
    
    function toggleMinimalMode() {
        if (isMinimalMode) {
            disableMinimalMode();
        } else {
            enableMinimalMode();
        }
    }
    
    // Eventos para el botón de dominio: pulsación larga (modo minimalista) / corta (cambio de dominio)
    domainToggleBtn.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        pressTimer = setTimeout(() => {
            toggleMinimalMode();
            pressTimer = null;
        }, 500);
    });
    
    domainToggleBtn.addEventListener('mouseup', (e) => {
        if (pressTimer) {
            clearTimeout(pressTimer);
            pressTimer = null;
            toggleDomainMode();
        }
    });
    
    domainToggleBtn.addEventListener('mouseleave', () => {
        if (pressTimer) {
            clearTimeout(pressTimer);
            pressTimer = null;
        }
    });
    
    domainToggleBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        pressTimer = setTimeout(() => {
            toggleMinimalMode();
            pressTimer = null;
        }, 500);
    });
    
    domainToggleBtn.addEventListener('touchend', (e) => {
        e.preventDefault();
        if (pressTimer) {
            clearTimeout(pressTimer);
            pressTimer = null;
            toggleDomainMode();
        }
    });
    
    domainToggleBtn.addEventListener('touchcancel', (e) => {
        if (pressTimer) {
            clearTimeout(pressTimer);
            pressTimer = null;
        }
    });
    
    // Evento para el botón de inicio (home)
    homeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        goToHome();
    });
    
    // Eventos para los botones de deportes
    sportButtons.forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const path = btn.getAttribute('data-path');
            const isCurrentlyActive = btn.classList.contains('active-filter');
            
            if (isCurrentlyActive && path) {
                // Si ya está activo: recargar la página base (home)
                goToHome();
            } else if (path) {
                // Navegar al deporte y activar este botón
                navigateToSportPage(path, btn);
            }
        });
    });
    
    // Iniciar toda la lógica
    init();
    loadOverlayPreference();
    
    // Guardar modo actual antes de cerrar
    window.addEventListener('beforeunload', () => {
        sessionStorage.setItem('fctv_mode', currentMode);
    });
</script>

<script>
    (function setupPWA() {
        function createIcon(size, text, bgColor, textColor) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, size, size);
            const grad = ctx.createLinearGradient(0, 0, size, size);
            grad.addColorStop(0, '#1f2f3a');
            grad.addColorStop(1, '#0a1219');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, size, size);
            ctx.strokeStyle = '#fbbd14';
            ctx.lineWidth = size * 0.03;
            ctx.strokeRect(size*0.1, size*0.1, size*0.8, size*0.8);
            ctx.fillStyle = textColor;
            ctx.font = `bold ${size * 0.28}px "Segoe UI", system-ui`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(text, size/2, size/2);
            ctx.font = `${size * 0.09}px monospace`;
            ctx.fillStyle = "#fbbd14";
            ctx.fillText("LIVE", size/2, size * 0.8);
            return canvas.toDataURL('image/png');
        }
        
        const icon192 = createIcon(192, "F33", "#0f1722", "#ffffff");
        const icon512 = createIcon(512, "FCTV", "#0f1722", "#ffffff");
        
        const manifestObj = {
            name: "FCTV Link - Hubu",
            short_name: "FCTV33",
            description: "Streaming deportivo gratuito. Enlace principal + mirror",
            start_url: ".",
            display: "standalone",
            theme_color: "#0a0a0a",
            background_color: "#000000",
            orientation: "any",
            icons: [
                { src: icon192, sizes: "192x192", type: "image/png", purpose: "any maskable" },
                { src: icon512, sizes: "512x512", type: "image/png", purpose: "any maskable" }
            ]
        };
        
        const manifestBlob = new Blob([JSON.stringify(manifestObj)], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(manifestBlob);
        const manifestLink = document.getElementById('manifest-link');
        if (manifestLink) manifestLink.href = manifestURL;
        
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => {
                    console.log("[PWA] Service Worker no registrado (opcional)", err);
                });
            });
        }
    })();
</script>
</body>
</html>
